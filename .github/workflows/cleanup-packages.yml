name: Cleanup old container images

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete container versions older than 60 minutes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const cutoff = Date.now() - 60 * 60 * 1000; // 60 minutes ago

            // List all container packages in the org (requires org-scoped PAT)
            const packages = await github.rest.packages.listPackagesForOrganization({
              org: 'Privasys',
              package_type: 'container',
              per_page: 100,
            });

            let deleted = 0;
            for (const pkg of packages.data) {
              // Only clean up packages under the apps/ namespace
              if (!pkg.name.startsWith('apps/')) continue;

              const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                org: 'Privasys',
                package_type: 'container',
                package_name: pkg.name,
                per_page: 100,
              });

              for (const version of versions.data) {
                const createdAt = new Date(version.created_at).getTime();
                if (createdAt < cutoff) {
                  console.log(`Deleting ${pkg.name}:${version.id} (created ${version.created_at})`);
                  await github.rest.packages.deletePackageVersionForOrg({
                    org: 'Privasys',
                    package_type: 'container',
                    package_name: pkg.name,
                    package_version_id: version.id,
                  });
                  deleted++;
                }
              }
            }
            console.log(`Done. Deleted ${deleted} old container version(s).`);

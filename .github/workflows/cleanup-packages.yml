name: Cleanup old container images

on:
  schedule:
    - cron: "0 3 * * *" # daily at 3am UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete container versions older than 7 days
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000; // 7 days ago

            // List all container packages in the org
            const packages = await github.rest.packages.listPackagesForOrganization({
              org: 'Privasys',
              package_type: 'container',
              per_page: 100,
            });

            for (const pkg of packages.data) {
              // Only clean up packages under the apps/ namespace
              if (!pkg.name.startsWith('apps/')) continue;

              // URL-encode the package name (e.g. "apps/my-app" → "apps%2Fmy-app")
              // The Octokit client doesn't encode slashes in path parameters.
              const encodedName = encodeURIComponent(pkg.name);

              let versions;
              try {
                versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  org: 'Privasys',
                  package_type: 'container',
                  package_name: encodedName,
                  per_page: 100,
                });
              } catch (e) {
                console.log(`Skipping ${pkg.name}: ${e.message}`);
                continue;
              }

              for (const version of versions.data) {
                const createdAt = new Date(version.created_at).getTime();
                if (createdAt < cutoff) {
                  console.log(`Deleting ${pkg.name}:${version.id} (created ${version.created_at})`);
                  try {
                    await github.rest.packages.deletePackageVersionForOrg({
                      org: 'Privasys',
                      package_type: 'container',
                      package_name: encodedName,
                      package_version_id: version.id,
                    });
                  } catch (e) {
                    console.log(`  Failed to delete ${pkg.name}:${version.id}: ${e.message}`);
                  }
                }
              }
            }

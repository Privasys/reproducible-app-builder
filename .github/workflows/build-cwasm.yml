name: Build .cwasm

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Adopter's GitHub repository (owner/repo)"
        required: true
        type: string
      commit:
        description: "Full commit SHA to build"
        required: true
        type: string
      build_id:
        description: "Management service build job ID"
        required: true
        type: string
      callback_url:
        description: "URL to POST build results to"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Notify running
        run: |
          curl -sf -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "build_id": "${{ inputs.build_id }}",
              "status": "running",
              "run_id": ${{ github.run_id }},
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || true

      - name: Pull builder image & checkout (parallel)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null
          docker pull ghcr.io/privasys/reproducible-app-builder:latest &
          PULL_PID=$!
          git clone --depth 1 --branch "${{ inputs.commit }}" \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ inputs.repo_url }}.git" app 2>/dev/null \
          || {
            git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ inputs.repo_url }}.git" app
            cd app && git checkout "${{ inputs.commit }}" && cd ..
          }
          wait $PULL_PID

      - name: Build WASM component
        run: |
          docker run --rm -v "${{ github.workspace }}/app:/work" -w /work \
            ghcr.io/privasys/reproducible-app-builder:latest \
            sh -c '
              if cargo component build --release 2>&1; then
                echo "Built with cargo-component"
              elif cargo build --release --target wasm32-wasip2 2>&1; then
                echo "Built with cargo build (wasm32-wasip2)"
              elif cargo build --release --target wasm32-wasip1 2>&1; then
                echo "Built with cargo build (wasm32-wasip1)"
              else
                echo "::error::All build methods failed"
                exit 1
              fi
            '

      - name: Find .wasm artifact
        id: find-wasm
        working-directory: app
        run: |
          WASM_FILE=$(find target -name '*.wasm' -path '*/release/*' -not -path '*/deps/*' -not -name '*.d' 2>/dev/null | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "::error::No .wasm file found in release output"
            exit 1
          fi
          echo "wasm_file=$WASM_FILE" >> "$GITHUB_OUTPUT"
          echo "Found: $WASM_FILE"

      - name: Inject WIT doc comments
        id: inject-docs
        run: |
          # Find the wit/ directory in the repo root (standard convention)
          WIT_DIR="${{ github.workspace }}/app/wit"
          if [ ! -d "$WIT_DIR" ]; then
            echo "No wit/ directory found — skipping doc injection"
            exit 0
          fi
          echo "Injecting WIT docs from $WIT_DIR into ${{ steps.find-wasm.outputs.wasm_file }}"
          docker run --rm \
            -v "${{ github.workspace }}/app:/work" \
            -v "${{ github.workspace }}:/out" \
            -w /work \
            ghcr.io/privasys/reproducible-app-builder:latest \
            python3 /usr/local/bin/inject-wit-docs.py /work/wit "/work/${{ steps.find-wasm.outputs.wasm_file }}" --output-json /out/docs.json

      - name: AOT compile to .cwasm
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/app:/work" \
            -v "${{ github.workspace }}:/out" \
            -w /work \
            ghcr.io/privasys/reproducible-app-builder:latest \
            enclave-os-wasm-compile "/work/${{ steps.find-wasm.outputs.wasm_file }}" -o /out/output.cwasm

      - name: Upload .cwasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: cwasm-${{ inputs.build_id }}
          path: output.cwasm
          retention-days: 30

      - name: Compute SHA-256
        id: hash
        run: |
          HASH=$(sha256sum output.cwasm | cut -d' ' -f1)
          SIZE=$(stat -c%s output.cwasm)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $HASH  Size: $SIZE bytes"
          echo "## Reproducible Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **WASM module SHA-256** | \`$HASH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | $SIZE bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | [${{ inputs.commit }}](https://github.com/${{ inputs.repo_url }}/commit/${{ inputs.commit }}) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify success
        if: success()
        run: |
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DOCS_FILE="${{ github.workspace }}/docs.json"
          python3 -c "
          import json, sys
          payload = {
              'build_id': '${{ inputs.build_id }}',
              'status': 'success',
              'run_id': ${{ github.run_id }},
              'run_url': '$ARTIFACT_URL',
              'cwasm_hash': '${{ steps.hash.outputs.hash }}',
              'cwasm_size': ${{ steps.hash.outputs.size }}
          }
          docs_file = '$DOCS_FILE'
          try:
              with open(docs_file) as f:
                  payload['docs'] = json.load(f)
          except FileNotFoundError:
              pass
          json.dump(payload, sys.stdout, ensure_ascii=False)
          " > /tmp/callback.json
          cat /tmp/callback.json
          curl -sf -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/callback.json

      - name: Notify failure
        if: failure()
        run: |
          curl -sf -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "build_id": "${{ inputs.build_id }}",
              "status": "failed",
              "run_id": ${{ github.run_id }},
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "error": "Build failed — check the workflow run for details"
            }' || true
